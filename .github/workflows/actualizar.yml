name: Actualizar catálogo streaming

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Debug (MUY IMPORTANTE para evitar errores como el tuyo)
      - name: Ver estructura del repo
        run: |
          echo "📁 ESTRUCTURA:"
          ls -R

      # 3. Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 4. Detectar estructura y ejecutar install si hace falta
      - name: Install dependencies
        run: |
          if [ -f "frontend/package.json" ]; then
            echo "📦 Usando frontend/"
            cd frontend
            npm install
          elif [ -f "package.json" ]; then
            echo "📦 Usando raíz"
            npm install
          else
            echo "❌ No se encontró package.json"
            exit 1
          fi

      # 5. Ejecutar script correctamente según estructura
      - name: Run script
        run: |
          if [ -d "frontend" ]; then
            echo "🎬 Ejecutando desde frontend context"
            node scripts/obtenerEstrenos.js
          else
            echo "🎬 Ejecutando desde raíz"
            node scripts/obtenerEstrenos.js
          fi
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}

      # 6. Commit cambios
      - name: Commit changes
        run: |
          git config --global user.name "Streaming Bot"
          git config --global user.email "bot@streaming.com"

          git add .

          git diff --cached --quiet && echo "Sin cambios" && exit 0

          git commit -m "update estrenos streaming"
          git push
